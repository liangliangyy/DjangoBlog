<!-- 发表评论表单 -->
<div id="respond" class="comment-respond mt-10">

    <!-- 表单标题 -->
    <div class="mb-5 flex items-center gap-2.5 border-t border-border pt-8">
        <svg class="size-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
        <h3 class="text-base font-semibold tracking-tight text-foreground m-0">发表评论</h3>
    </div>

    <!-- 评论表单 -->
    <form action="{% url 'comments:postcomment' article.pk %}"
          method="post"
          id="commentform"
          class="comment-form"
          hx-post="{% url 'comments:postcomment' article.pk %}"
          hx-target="#main"
          hx-select="#main"
          hx-swap="innerHTML"
          hx-push-url="true">

        {% csrf_token %}

        <div class="overflow-hidden rounded-xl border border-border bg-card shadow-sm">
            <!-- 评论内容 -->
            <div class="p-4 md:p-5">
                <textarea
                    name="{{ form.body.html_name }}"
                    id="{{ form.body.id_for_label }}"
                    class="w-full resize-y rounded-lg border border-border bg-background px-3.5 py-3 text-sm text-foreground placeholder:text-muted-foreground transition-colors focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20"
                    placeholder="写下你的评论…（支持 Markdown 语法）"
                    rows="5"
                    required
                >{{ form.body.value|default:'' }}</textarea>

                {% if form.body.errors %}
                    <div class="mt-2 flex items-start gap-1.5 text-sm text-destructive">
                        <svg class="mt-0.5 size-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                        </svg>
                        <span>{{ form.body.errors }}</span>
                    </div>
                {% endif %}
            </div>

            <!-- 隐藏字段 -->
            <div class="hidden">{{ form.parent_comment_id }}</div>

            <!-- 底部操作栏 -->
            <div class="flex items-center justify-between flex-wrap gap-3 border-t border-border px-4 md:px-5 py-3">
                <div class="flex items-center gap-1.5 text-xs text-muted-foreground">
                    <svg class="size-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/>
                    </svg>
                    <span>支持 Markdown</span>
                    {% if COMMENT_NEED_REVIEW %}
                        <span class="text-border">·</span>
                        <span>审核后显示</span>
                    {% endif %}
                </div>

                <div class="flex items-center gap-2">
                    <!-- 取消回复按钮（条件显示） -->
                    <button type="button"
                            id="cancel_comment"
                            data-action="cancel-reply"
                            class="hidden items-center gap-1.5 rounded-lg border border-border px-3 py-1.5 text-xs font-medium text-muted-foreground transition-colors hover:border-border/80 hover:text-foreground">
                        <svg class="size-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                        <span>取消回复</span>
                    </button>

                    <!-- 提交按钮 -->
                    <button type="submit"
                            id="submit-comment-btn"
                            class="inline-flex items-center gap-1.5 rounded-lg bg-primary px-4 py-1.5 text-sm font-medium text-primary-foreground shadow-sm transition-all hover:opacity-90">
                        <svg class="size-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                        </svg>
                        <span>发表评论</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Markdown 快速参考 -->
        <details class="mt-3 group">
            <summary class="flex cursor-pointer items-center gap-1.5 text-xs text-muted-foreground transition-colors hover:text-foreground list-none [&::-webkit-details-marker]:hidden">
                <svg class="size-3 transition-transform duration-150 group-open:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
                Markdown 语法参考
            </summary>
            <div class="mt-2 flex flex-wrap gap-x-4 gap-y-1.5 rounded-lg border border-border/60 bg-muted/40 px-3 py-2.5">
                <span class="font-mono text-[11px] text-muted-foreground">**粗体**</span>
                <span class="font-mono text-[11px] text-muted-foreground">*斜体*</span>
                <span class="font-mono text-[11px] text-muted-foreground">`代码`</span>
                <span class="font-mono text-[11px] text-muted-foreground">~~删除~~</span>
                <span class="font-mono text-[11px] text-muted-foreground">[链接](url)</span>
                <span class="font-mono text-[11px] text-muted-foreground">> 引用</span>
                <span class="font-mono text-[11px] text-muted-foreground">- 列表</span>
                <span class="font-mono text-[11px] text-muted-foreground"># 标题</span>
            </div>
        </details>
    </form>
</div>
