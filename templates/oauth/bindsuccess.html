{% extends 'share_layout/base.html' %}
{% block header %}
    <title>{{ title }}</title>
{% endblock %}
{% block content %}
    <div class="mx-auto max-w-6xl px-4 py-6 lg:px-6 lg:py-10">
        <div class="mx-auto max-w-lg">
            <div class="rounded-xl border border-border/60 bg-card p-8 text-center shadow-xl shadow-foreground/5 transition-all duration-300">
                <div class="inline-flex items-center justify-center size-12 rounded-xl bg-primary mb-4 shadow-md shadow-primary/20">
                    <svg class="size-6 text-primary-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>

                <h2 class="text-xl font-bold tracking-tight text-foreground mb-4">{{ content }}</h2>

                <div class="flex items-center justify-center gap-4 text-sm">
                    <a href="{% url 'account:login' %}"
                       class="inline-flex items-center gap-1.5 font-medium text-primary transition-colors hover:text-primary/80">
                        <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                        </svg>
                        登录
                    </a>
                    <span class="text-border">|</span>
                    <a href="/"
                       class="inline-flex items-center gap-1.5 font-medium text-primary transition-colors hover:text-primary/80">
                        <svg class="size-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                        回到首页
                    </a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
