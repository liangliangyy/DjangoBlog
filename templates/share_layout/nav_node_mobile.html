{% load blog_tags %}
{% query nav_category_list parent_category=node as child_categorys %}

<li x-data="{ expanded: false }">
    <div class="flex items-center">
        <a href="{{ node.get_absolute_url }}"
           hx-boost="false"
           @click="closeMobileMenu()"
           class="flex-1 flex items-center gap-3 rounded-lg px-4 py-3
                  text-sm font-medium transition-all duration-200
                  {% if node.get_absolute_url == request.path %}
                      bg-primary/10 text-primary
                  {% else %}
                      text-foreground hover:bg-secondary
                  {% endif %}">
            {{ node.name }}
        </a>
        {% if child_categorys %}
            <button @click="expanded = !expanded"
                    class="flex items-center justify-center p-3
                           text-muted-foreground transition-all duration-200
                           hover:text-foreground"
                    :aria-expanded="expanded ? 'true' : 'false'">
                <svg class="w-5 h-5 transition-transform" :class="{ 'rotate-180': expanded }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </button>
        {% endif %}
    </div>

    {% if child_categorys %}
        <div x-show="expanded"
             x-cloak
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-2"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 -translate-y-2"
             class="ml-6 mt-1 space-y-1 border-l-2 border-border pl-4">
            {% for child in child_categorys %}
                <a href="{{ child.get_absolute_url }}"
                   hx-boost="false"
                   @click="closeMobileMenu()"
                   class="flex items-center gap-2 rounded-lg px-3 py-2
                          text-sm text-muted-foreground transition-all duration-200
                          hover:bg-secondary hover:text-primary">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
                    </svg>
                    {{ child.name }}
                </a>
            {% endfor %}
        </div>
    {% endif %}
</li>
